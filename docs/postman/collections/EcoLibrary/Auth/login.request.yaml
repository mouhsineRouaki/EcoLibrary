$kind: http-request
name: login
description: |-
  Authentifie un utilisateur et retourne un token Sanctum Bearer.

  Le script post-réponse sauvegarde automatiquement le `token` dans la variable d'environnement `{{token}}`.

  **Réponse succès :** `200 OK`
url: '{{base_url}}/login'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "test@example.com",
      "password": "password"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      var json = pm.response.json();
      if (json.token) {
          pm.environment.set("token", json.token);
          console.log("Token saved:", json.token);
      }
