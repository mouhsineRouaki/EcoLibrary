$kind: http-request
name: delete book
description: |-
  Supprime définitivement un livre par son identifiant.

  **Authentification requise :** Bearer `{{token}}` + rôle `admin`

  **Réponse succès :** `200 OK`
url: '{{base_url}}/admin/books/:id'
method: DELETE
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: '1'
