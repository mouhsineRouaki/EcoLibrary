$kind: http-request
name: update category
description: |-
  Met à jour les informations d'une catégorie existante.

  **Authentification requise :** Bearer `{{token}}` + rôle `admin`

  **Réponse succès :** `200 OK`
url: '{{base_url}}/admin/categories/:id'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: '1'
body:
  type: json
  content: |-
    {
      "name": "Science Updated",
      "slug": "science-updated",
      "description": "Updated description"
    }
