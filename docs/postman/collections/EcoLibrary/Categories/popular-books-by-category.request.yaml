$kind: http-request
name: popular books by category
description: |-
  Retourne jusqu'à **10 livres** triés par nombre de vues décroissant pour une catégorie donnée.

  **Authentification requise :** Bearer `{{token}}`
url: '{{base_url}}/categories/:id/books/popular'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: '1'
