$kind: http-request
name: list books
description: |-
  Retourne la liste complète de tous les livres disponibles.

  **Authentification requise :** Bearer `{{token}}`

  **Réponse succès :** `200 OK`
  **Aucun livre :** `404 Not Found`
url: '{{base_url}}/books'
method: GET
headers:
  - key: Accept
    value: application/json
